name: c2pa_view
description: "`c2pa_view` is a Flutter plugin for viewing C2PA manifests in files. 
It provides a simple interface to extract and display C2PA metadata using the official C2PA Rust 
library and the Flutter Rust Bridge."
version: 0.1.0
homepage: "https://github.com/Township-Innovation/c2pa_view"

environment:
  sdk: ^3.7.0
  flutter: '>=3.3.0'

dependencies:
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.9.0
  http: ^1.3.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^13.0.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true

  assets:
    # Assets for c2pa tags
    - assets/c2pa/
